function openSaleForm(editId){
  const rec=editId?DB.getSales().find(s=>s.id===editId):null, today=DB.today();
  const isCredit=rec?.payment_type==='credit';
  openModal(`<div class="modal-ttl">${rec?'Edit':'Record'} Sale <button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="field"><label>Date of Sale</label><input type="date" id="sf_date" value="${rec?rec.date:today}" max="${today}"></div>
    <div class="field"><label>Product</label>
      <select id="sf_prod">${PRODUCT_TYPES.map(p=>`<option value="${p}" ${rec?.product===p?'selected':''} >${p}</option>`).join('')}</select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Quantity</label><input type="number" id="sf_qty" value="${rec?.quantity||''}" min="1" placeholder="e.g. 10" oninput="calcSaleTotal()"></div>
      <div class="field"><label>Unit Price (₦)</label><input type="number" id="sf_price" value="${rec?.unit_price_ngn||''}" min="0" step="100" placeholder="e.g. 3500" oninput="calcSaleTotal()"></div>
    </div>
    <div class="field"><label>Total Amount (₦)</label>
      <input type="number" id="sf_total" value="${rec?.total_amount_ngn||''}" placeholder="Auto-calculated" style="background:#f5f5f5"></div>
    <div class="field"><label>Payment</label>
      <select id="sf_pay" onchange="toggleSalePayFields()">
        <option value="cash" ${!isCredit?'selected':''}>Cash — collected immediately</option>
        <option value="credit" ${isCredit?'selected':''}>Credit — customer pays later</option>
      </select></div>
    <div id="sf_credit_fields" style="display:${isCredit?'block':'none'}">
      <div class="field"><label>Customer Name <span style="color:var(--red)">*</span> <span style="font-size:11px;color:var(--gray);font-weight:400">required for credit</span></label>
        <input type="text" id="sf_cust" value="${isCredit?rec?.customer||'':'' }" placeholder="e.g. Alhaji Musa"></div>
      <div class="field"><label>Payment Due Date</label>
        <input type="date" id="sf_due" value="${rec?.due_date||''}" min="${today}"></div>
    </div>
    <div id="sf_cash_fields" style="display:${!isCredit?'block':'none'}">
      <div class="field"><label>Customer <span style="color:var(--gray);font-weight:400">— optional</span></label>
        <input type="text" id="sf_cust_cash" value="${!isCredit?rec?.customer||'':'' }" placeholder="Customer name (optional for cash)"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="sf_notes" placeholder="Optional">${rec?.notes||''}</textarea></div>
    <button class="btn btn-primary" onclick="saveSale('${editId||''}')">Save Sale</button>`);
}
function toggleSalePayFields(){
  const isCredit=document.getElementById('sf_pay')?.value==='credit';
  const cf=document.getElementById('sf_credit_fields'), ca=document.getElementById('sf_cash_fields');
  if(cf)cf.style.display=isCredit?'block':'none';
  if(ca)ca.style.display=isCredit?'none':'block';
}
function calcSaleTotal(){
  const q=parseFloat(document.getElementById('sf_qty')?.value)||0;
  const p=parseFloat(document.getElementById('sf_price')?.value)||0;
  const t=document.getElementById('sf_total'); if(t)t.value=(q*p).toFixed(0);
}
function saveSale(editId){
  const payType=document.getElementById('sf_pay').value;
  const isCredit=payType==='credit';
  const customer=isCredit
    ?(document.getElementById('sf_cust')?.value.trim()||''  )
    :(document.getElementById('sf_cust_cash')?.value.trim()||''  );
  if(isCredit&&!customer){toast('Enter customer name for credit sale');return;}
  const qty=parseFloat(document.getElementById('sf_qty').value)||0;
  const price=parseFloat(document.getElementById('sf_price').value)||0;
  const existingRec=editId?DB.getSales().find(s=>s.id===editId):null;
  const rec={
    id:editId||uid(),
    date:document.getElementById('sf_date').value,
    product:document.getElementById('sf_prod').value,
    quantity:qty, unit_price_ngn:price,
    total_amount_ngn:parseFloat(document.getElementById('sf_total').value)||(qty*price),
    payment_type:payType,
    paid:isCredit?(existingRec?.paid||false):true,
    due_date:isCredit?(document.getElementById('sf_due')?.value||null):null,
    customer, notes:document.getElementById('sf_notes').value.trim()};
  if(editId)DB.updSale(editId,rec);else DB.addSale(rec);
  closeModal();toast(isCredit?'Credit sale recorded — see Receivables ✓':'Cash sale recorded ✓');renderFinance();
}
function markSalePaid(saleId){
  DB.updSale(saleId,{paid:true});
  toast('Payment received — marked as paid ✓');renderFinance();
}
function delSale(id){openModal(`<div class="modal-ttl">Delete Sale? <button class="modal-x" onclick="closeModal()">×</button></div>
  <p style="font-size:14px;color:var(--gray);margin-bottom:18px">This cannot be undone.</p>
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="btn btn-danger" onclick="closeModal();DB.delSale('${id}');toast('Deleted');renderFinance()">Delete</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>`);}


// ═══════════════════════════════════════════════
// REPORTS — MULTI-MODULE ANALYTICS
// ═══════════════════════════════════════════════
let REP_TAB='eggs', ANA_TAB='cells', ANA_DATE=null, TREND_MODE='weekly', FEED_CHART_OFFSET=0;
let CELL_SORT={field:null,dir:'desc'};
function setCellSort(field){CELL_SORT=CELL_SORT.field===field?{field,dir:CELL_SORT.dir==='desc'?'asc':'desc'}:{field,dir:'desc'};renderReports();}
function sortCells(arr){
  if(!CELL_SORT.field)return arr;
  return [...arr].sort((a,b)=>{
    const av=CELL_SORT.field==='rate'?(a.rate??-1):(a.totalEggs>0?a.totalBroken/a.totalEggs*100:-1);
    const bv=CELL_SORT.field==='rate'?(b.rate??-1):(b.totalEggs>0?b.totalBroken/b.totalEggs*100:-1);
    return CELL_SORT.dir==='desc'?bv-av:av-bv;
  });
}
function filterColsByDate(allCols){
  if(!ANA_DATE)return allCols;
  if(ANA_DATE==='last7'||ANA_DATE==='last30'){
    const days=ANA_DATE==='last7'?7:30;
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    return allCols.filter(c=>c.date>=cutoff.toISOString().slice(0,10));
  }
  return allCols.filter(c=>c.date===ANA_DATE);
}
function anaModeLabel(){if(!ANA_DATE)return'All Time';if(ANA_DATE==='last7')return'Last 7 Days';if(ANA_DATE==='last30')return'Last 30 Days';return fmtDate(ANA_DATE);}

function renderReports(){
  const el=document.getElementById('v-reports');
  const farm=DB.getFarm();
  if(!farm){el.innerHTML=`<div class="topbar"><div><h1>Reports</h1></div></div><div class="empty"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><h3>No data yet</h3><p>Start logging data to see reports.</p></div>`;return;}

  const allCols=DB.getCols();
  const allDates=[...new Set(allCols.map(c=>c.date))].sort((a,b)=>b.localeCompare(a));
  const farmBirds=getFarmTotalBirds(farm);
  const validPenIds=new Set((farm.pens||[]).map(p=>p.id));
  const cols=filterColsByDate(allCols).filter(c=>validPenIds.has(c.penId));
  const modeLabel=anaModeLabel();
  const dateOpts=`<option value="" ${!ANA_DATE?'selected':''}>All Time</option>
    <optgroup label="─── Quick Range ───">
      <option value="last7" ${ANA_DATE==='last7'?'selected':''}>Last 7 Days</option>
      <option value="last30" ${ANA_DATE==='last30'?'selected':''}>Last 30 Days</option>
    </optgroup>
    <optgroup label="─── Specific Day ───">
      ${allDates.map(d=>`<option value="${d}" ${d===ANA_DATE?'selected':''}>${fmtDate(d)}</option>`).join('')}
    </optgroup>`;

  let tabContent='';
  if(REP_TAB==='eggs'){
    // Egg analytics (from PoulTrack)
    const isSingleDay=!!ANA_DATE&&ANA_DATE!=='last7'&&ANA_DATE!=='last30';
    const sessionCol=isSingleDay?'Rounds':'Sessions';
    const cellMap={}, cellDayBirds={};
    cols.forEach(col=>{
      const colExp=col.exp??(farm.expectedRate||85), colWarn=col.warn??(farm.warnRate||70);
      (col.entries||[]).forEach(e=>{
        const k=`${col.penId}|${col.side}|${e.standId}|${e.tier}|${e.cellNum}`;
        const dk=`${k}|${col.date}`;
        if(!cellMap[k])cellMap[k]={totalEggs:0,totalBirds:0,totalBroken:0,sessions:0,sumExp:0,sumWarn:0,penId:col.penId,side:col.side,standId:e.standId,tier:e.tier,cellNum:e.cellNum};
        cellMap[k].totalEggs+=(e.eggs||0);cellMap[k].totalBroken+=(e.broken||0);
        cellMap[k].sessions++;cellMap[k].sumExp+=colExp;cellMap[k].sumWarn+=colWarn;
        if(!cellDayBirds[dk]){cellDayBirds[dk]=true;cellMap[k].totalBirds+=(e.birds||0);}
      });
    });
    const cells=Object.values(cellMap).map(c=>({...c,days:c.sessions,
      rate:c.totalBirds>0?c.totalEggs/c.totalBirds*100:null,
      avgExp:c.sessions>0?c.sumExp/c.sessions:(farm.expectedRate||85),
      avgWarn:c.sessions>0?c.sumWarn/c.sessions:(farm.warnRate||70)}));
    const poor=cells.filter(c=>c.rate!==null&&c.rate<c.avgWarn).sort((a,b)=>a.rate-b.rate);
    const top=cells.filter(c=>c.rate!==null&&c.rate>=c.avgExp).sort((a,b)=>b.rate-a.rate).slice(0,10);
    let totalEggs=0,totalBroken=0;
    cols.forEach(col=>(col.entries||[]).forEach(e=>{totalEggs+=(e.eggs||0);totalBroken+=(e.broken||0);}));
    // Avg daily Hen Day Production: for each egg-collection day, use actual bird count from bird log
    const _birdLog=DB.getBirds().sort((a,b)=>a.date.localeCompare(b.date));
    const _birdDateMap={};_birdLog.forEach(r=>{_birdDateMap[r.date]=(r.closing_birds||r.opening_birds||0);});
    const _birdDates=Object.keys(_birdDateMap).sort();
    function _birdsOn(date){if(_birdDateMap[date])return _birdDateMap[date];const p=_birdDates.filter(d=>d<=date).pop();return p?_birdDateMap[p]:farmBirds;}
    const _eggsByDate={};cols.forEach(col=>(col.entries||[]).forEach(e=>{_eggsByDate[col.date]=(_eggsByDate[col.date]||0)+(e.eggs||0);}));
    const _hdp=Object.entries(_eggsByDate).map(([d,eggs])=>{const b=_birdsOn(d);return b>0?eggs/b*100:null;}).filter(r=>r!==null);
    const overallRate=_hdp.length>0?_hdp.reduce((s,r)=>s+r,0)/_hdp.length:null;
    const crackRate=totalEggs>0?totalBroken/totalEggs*100:null;
    const crackColor=crackRate===null?'var(--gray)':crackRate>3?'var(--red)':crackRate>=2?'var(--amber)':'var(--g3)';
    const roundMap={};
    cols.forEach(c=>{if(!roundMap[c.round])roundMap[c.round]={label:c.roundLabel,eggs:0};
      (c.entries||[]).forEach(e=>{roundMap[c.round].eggs+=(e.eggs||0);});});
    const totalRndEggs=Object.values(roundMap).reduce((s,v)=>s+v.eggs,0);

    const cellRow=(c)=>{
      const stand=findStandInFarm(farm,c.standId), pen=(farm.pens||[]).find(p=>p.id===c.penId);
      const cRate=c.totalEggs>0?c.totalBroken/c.totalEggs*100:null;
      const cColor=cRate===null?'var(--gray)':cRate>3?'var(--red)':cRate>=2?'var(--amber)':'var(--g3)';
      return`<tr>
        <td><b>T${c.tier}·C${c.cellNum}</b><br><small style="color:var(--gray)">${pen?.name||''} · ${stand?.name||c.standId}</small></td>
        <td><span class="badge badge-gray">Side ${c.side}</span></td>
        <td style="color:var(--gray)">${c.days}</td>
        <td style="color:var(--red);font-weight:700">${c.totalBroken}</td>
        <td><div class="rate-bar-wrap"><div class="rate-bar" style="width:${Math.min(c.rate||0,100)}px;background:${rateColor(c.rate)}"></div>${rateBadge(c.rate)}</div></td>
        <td style="font-weight:700;color:${cColor}">${cRate!==null?cRate.toFixed(1)+'%':'—'}</td></tr>`;
    };

    if(ANA_TAB==='cells'){
      tabContent=`
        <div class="kpi-row-5">
          <div class="kpi-sm"><div class="kpi-val-sm" style="color:var(--g2)">${totalEggs}</div><div class="kpi-lbl-sm">Eggs</div></div>
          <div class="kpi-sm"><div class="kpi-val-sm" style="color:${rateColor(overallRate)}">${overallRate!==null?overallRate.toFixed(0)+'%':'—'}</div><div class="kpi-lbl-sm">Prod Rate</div></div>
          <div class="kpi-sm"><div class="kpi-val-sm" style="color:var(--g1)">${farmBirds}</div><div class="kpi-lbl-sm">Birds</div></div>
          <div class="kpi-sm"><div class="kpi-val-sm" style="color:var(--red)">${totalBroken}</div><div class="kpi-lbl-sm">Broken</div></div>
          <div class="kpi-sm" style="${crackRate>3?'border:2px solid var(--red)':crackRate>=2?'border:2px solid var(--amber)':''}">
            <div class="kpi-val-sm" style="color:${crackColor}">${crackRate!==null?crackRate.toFixed(1)+'%':'—'}</div>
            <div class="kpi-lbl-sm">Crack Rate</div></div>
        </div>
        ${(()=>{
          const rateArrow=CELL_SORT.field==='rate'?(CELL_SORT.dir==='desc'?' ↓':' ↑'):' ↕';
          const crackArrow=CELL_SORT.field==='crackRate'?(CELL_SORT.dir==='desc'?' ↓':' ↑'):' ↕';
          const rateStyle=`cursor:pointer;user-select:none;white-space:nowrap${CELL_SORT.field==='rate'?';color:var(--g2)':''}`;
          const crackStyle=`cursor:pointer;user-select:none;white-space:nowrap${CELL_SORT.field==='crackRate'?';color:var(--red)':''}`;
          const hdr=`<tr><th>Cell</th><th>Side</th><th>${sessionCol}</th><th>Broken</th>
            <th style="${rateStyle}" onclick="setCellSort('rate')">Avg Rate<span style="font-size:10px">${rateArrow}</span></th>
            <th style="${crackStyle}" onclick="setCellSort('crackRate')">Crack Rate<span style="font-size:10px">${crackArrow}</span></th></tr>`;
          const sortedTop=sortCells(top), sortedPoor=sortCells(poor);
          return`<div class="sec-hdr" style="margin-top:8px">⭐ Top Performing Cells</div>
          <div style="font-size:11px;color:var(--gray);margin:-4px 16px 8px">Meeting or exceeding target rate at time of collection.</div>
          <div class="card" style="padding:0;overflow:hidden">
            ${sortedTop.length===0?'<div class="empty" style="padding:20px 16px"><p style="margin:0;font-size:13px">No top-performing cells yet.</p></div>':
              `<table class="ana-table">${hdr}${sortedTop.map(cellRow).join('')}</table>`}
          </div>
          <div class="sec-hdr" style="margin-top:16px">⚠️ Underperforming Cells</div>
          <div style="font-size:11px;color:var(--gray);margin:-4px 16px 8px">Below warn threshold — flagged for action.</div>
          <div class="card" style="padding:0;overflow:hidden">
            ${sortedPoor.length===0?'<div class="empty" style="padding:20px 16px"><p style="margin:0;font-size:13px">No underperforming cells 🎉</p></div>':
              `<table class="ana-table">${hdr}${sortedPoor.map(cellRow).join('')}</table>`}
          </div>`;
        })()}`;
    } else if(ANA_TAB==='rounds'){
      const daily=getDailySummary(14);
      tabContent=`
        <div class="sec-hdr" style="margin-top:8px">Round Distribution — ${modeLabel}</div>
        <div class="card" style="padding:0;overflow:hidden">
          ${Object.keys(roundMap).length===0?'<div style="padding:16px;color:var(--gray);font-size:13px">No data.</div>':
            Object.entries(roundMap).map(([r,v])=>{
              const pct=totalRndEggs>0?Math.round(v.eggs/totalRndEggs*100):0;
              const rInfo=ROUNDS.find(ri=>ri.id===parseInt(r))||{cls:'',label:`Round ${r}`};
              return`<div class="list-item"><div><span class="${rInfo.cls} round-chip">${v.label||rInfo.label}</span>
                <div style="font-size:11px;color:var(--gray);margin-top:4px">${v.eggs} eggs</div></div>
                <div style="text-align:right"><div style="font-size:18px;font-weight:800">${pct}%</div>
                  <div style="height:6px;width:80px;background:#eee;border-radius:3px;margin-top:4px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:var(--g3);border-radius:3px"></div></div></div></div>`;}).join('')}
        </div>
        <div class="sec-hdr">Daily Production (Last 14 Days)</div>
        <div class="card" style="padding:0;overflow:hidden">
          ${daily.map(d=>`<div class="list-item" style="cursor:pointer" onclick="ANA_DATE='${d.date}';ANA_TAB='cells';renderReports()">
            <div><div style="font-weight:700;font-size:14px">${fmtDate(d.date)}</div>
              <div style="font-size:12px;color:var(--gray)">${d.eggs} eggs · ${d.broken} broken · tap to drill in</div></div>
            ${rateBadge(d.rate)}</div>`).join('')}
        </div>`;
    } else if(ANA_TAB==='pens'){
      const penMap={}, penDB={};
      cols.forEach(col=>{if(!penMap[col.penId])penMap[col.penId]={name:col.penName||col.penId,eggs:0,birds:0,broken:0};
        (col.entries||[]).forEach(e=>{
          penMap[col.penId].eggs+=(e.eggs||0);penMap[col.penId].broken+=(e.broken||0);
          const pdk=`${col.penId}|${col.side}|${e.standId}|${e.tier}|${e.cellNum}|${col.date}`;
          if(!penDB[pdk]){penDB[pdk]=true;penMap[col.penId].birds+=(e.birds||0);}
        });});
      tabContent=`
        <div class="sec-hdr" style="margin-top:8px">Performance by Pen — ${modeLabel}</div>
        <div class="card" style="padding:0;overflow:hidden">
          <table class="ana-table"><tr><th>Pen</th><th>Eggs</th><th>Broken</th><th>Rate</th></tr>
          ${Object.values(penMap).map(p=>`<tr>
            <td><b>${p.name}</b></td>
            <td style="font-weight:800;color:var(--g2)">${p.eggs}</td>
            <td style="color:var(--red)">${p.broken}</td>
            <td>${rateBadge(p.birds>0?p.eggs/p.birds*100:null)}</td></tr>`).join('')}
          </table></div>`;
    }
    if(ANA_TAB==='trend'){
      // All-time egg data (independent of ANA_DATE filter)
      const _allColsTrend=DB.getCols().filter(c=>validPenIds.has(c.penId));
      const _allEggsByDate={};
      _allColsTrend.forEach(col=>(col.entries||[]).forEach(e=>{_allEggsByDate[col.date]=(_allEggsByDate[col.date]||0)+(e.eggs||0);}));
      // Date → flock age week (from bird log, with interpolation fallback)
      const _firstPen=(farm.pens||[])[0];
      const _bwAge=_birdLog.filter(r=>r.age_weeks!=null);
      const _ageWeekOn=(date)=>{
        const exact=_birdLog.find(r=>r.date===date&&r.age_weeks!=null);
        if(exact)return exact.age_weeks;
        const prior=_bwAge.filter(r=>r.date<=date).pop();
        if(prior){const dd=Math.floor((new Date(date)-new Date(prior.date+'T00:00:00'))/(864e5));return prior.age_weeks+Math.floor(dd/7);}
        if(_firstPen?.flockStartDate){const wk=Math.floor((new Date(date)-new Date(_firstPen.flockStartDate+'T00:00:00'))/(7*864e5));return wk+(_firstPen.flockAgeAtArrival||0);}
        return null;
      };
      const isWeekly=TREND_MODE==='weekly';
      const _buckets={};
      const _moN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      Object.entries(_allEggsByDate).forEach(([date,eggs])=>{
        const birds=_birdsOn(date); if(!birds)return;
        const dHDP=eggs/birds*100;
        let key,label,sortKey;
        if(isWeekly){const w=_ageWeekOn(date);if(w===null||w===undefined)return;key=w;label=`Wk ${w}`;sortKey=w;}
        else{key=date.slice(0,7);const mo=parseInt(date.slice(5,7))-1;label=`${_moN[mo]} '${date.slice(2,4)}`;sortKey=key;}
        if(!_buckets[key])_buckets[key]={hdpSum:0,days:0,eggs:0,label,sortKey};
        _buckets[key].hdpSum+=dHDP;_buckets[key].days++;_buckets[key].eggs+=eggs;
      });
      const _tPoints=Object.values(_buckets).sort((a,b)=>isWeekly?a.sortKey-b.sortKey:a.sortKey.localeCompare(b.sortKey))
        .map(b=>({...b,hdp:b.hdpSum/b.days})).filter(p=>!isNaN(p.hdp));
      const _peakPt=_tPoints.length>0?_tPoints.reduce((best,p)=>p.hdp>best.hdp?p:best):null;
      const _pdsAbove80=_tPoints.filter(p=>p.hdp>=80).length;
      const _lastPt=_tPoints[_tPoints.length-1];
      let _tArrow='→',_tCol='var(--gray)';
      if(_tPoints.length>=4){
        const l3=_tPoints.slice(-3).reduce((s,p)=>s+p.hdp,0)/3;
        const p3=_tPoints.slice(-6,-3);if(p3.length){const p3a=p3.reduce((s,p)=>s+p.hdp,0)/p3.length;if(l3>p3a+2){_tArrow='↑';_tCol='var(--g2)';}else if(l3<p3a-2){_tArrow='↓';_tCol='var(--red)';}}
      }
      const _maxRate=_tPoints.length>0?Math.max(..._tPoints.map(p=>p.hdp)):20;
      const _yMax=Math.max(Math.ceil(_maxRate/5)*5+5,20);
      window._trendPts=_tPoints;
      const _trendSvg=(()=>{
        const pts=_tPoints,n=pts.length;
        if(n<2)return`<div style="color:var(--gray);font-size:13px;padding:24px 0;text-align:center">Not enough data — log eggs across at least 2 ${isWeekly?'weeks':'months'} to see the trend.</div>`;
        const svgW=600,cH=110,lblH=18,svgH=cH+lblH,padL=36,padR=8,plotW=svgW-padL-padR;
        const yp=(v)=>(cH-6)-(Math.min(Math.max(v,0),_yMax)/_yMax)*(cH-12)+2;
        const xp=(i)=>padL+(i/Math.max(n-1,1))*plotW;
        const yAxisLbls=`<text x="${padL-3}" y="${(yp(0)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#bbb">0</text>
          <text x="${padL-3}" y="${(yp(_yMax)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#bbb">${_yMax}</text>
          <line x1="${padL}" y1="${yp(0).toFixed(1)}" x2="${svgW-padR}" y2="${yp(0).toFixed(1)}" stroke="#eee" stroke-width="1"/>`;
        const bench=(_yMax>=80?`<line x1="${padL}" y1="${yp(80).toFixed(1)}" x2="${svgW-padR}" y2="${yp(80).toFixed(1)}" stroke="#27ae60" stroke-width="1" stroke-dasharray="5,3" opacity="0.7"/>
          <text x="${padL-3}" y="${(yp(80)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#27ae60" font-weight="700">80</text>`:'')
          +(_yMax>=70?`<line x1="${padL}" y1="${yp(70).toFixed(1)}" x2="${svgW-padR}" y2="${yp(70).toFixed(1)}" stroke="#e67e22" stroke-width="1" stroke-dasharray="5,3" opacity="0.7"/>
          <text x="${padL-3}" y="${(yp(70)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#e67e22" font-weight="700">70</text>`:'');
        const linePts=pts.map((p,i)=>`${xp(i).toFixed(1)},${yp(p.hdp).toFixed(1)}`).join(' ');
        const area=`<polygon points="${xp(0).toFixed(1)},${cH+2} ${linePts} ${xp(n-1).toFixed(1)},${cH+2}" fill="url(#tGrad)" opacity="0.18"/>`;
        const segs=pts.slice(0,-1).map((p,i)=>{const x1=xp(i),y1=yp(p.hdp),x2=xp(i+1),y2=yp(pts[i+1].hdp);const avg=(p.hdp+pts[i+1].hdp)/2;const col=avg>=80?'#27ae60':avg>=70?'#e67e22':'#c0392b';return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>`;}).join('');
        const dots=pts.map((p,i)=>{const x=xp(i),y=yp(p.hdp),isPk=p===_peakPt,col=p.hdp>=80?'#27ae60':p.hdp>=70?'#e67e22':'#c0392b';return`<g onmouseenter="showTrendTip(event,_trendPts[${i}])" onmouseleave="hideTrendTip()" onmousemove="positionTrendTip(event)" style="cursor:pointer"><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="11" fill="transparent"/><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isPk?4.5:2.5}" fill="${col}" stroke="white" stroke-width="1.5"/>${isPk?`<text x="${x.toFixed(1)}" y="${(y-10).toFixed(1)}" text-anchor="middle" font-size="9" fill="${col}" font-weight="800">▲${p.hdp.toFixed(0)}%</text>`:''}</g>`;}).join('');
        const lstep=Math.ceil(n/10);
        const xlbls=pts.map((p,i)=>i%lstep===0||i===n-1?`<text x="${xp(i).toFixed(1)}" y="${svgH-1}" text-anchor="middle" font-size="7.5" fill="#aaa">${p.label}</text>`:'').join('');
        return`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto;display:block;overflow:visible">
          <defs><linearGradient id="tGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#27ae60" stop-opacity="0.4"/><stop offset="100%" stop-color="#27ae60" stop-opacity="0"/></linearGradient></defs>
          ${yAxisLbls}${bench}${area}${segs}${dots}${xlbls}</svg>`;
      })();
      const _lbl=isWeekly?'Week':'Month';
      tabContent=`
        <div style="display:flex;align-items:center;gap:8px;margin:10px 16px 2px">
          <button class="btn ${TREND_MODE==='weekly'?'btn-primary':'btn-secondary'} btn-sm" style="min-width:72px" onclick="TREND_MODE='weekly';renderReports()">Weekly</button>
          <button class="btn ${TREND_MODE==='monthly'?'btn-primary':'btn-secondary'} btn-sm" style="min-width:72px" onclick="TREND_MODE='monthly';renderReports()">Monthly</button>
        </div>
        <div class="kpi-row-3">
          <div class="kpi"><div class="kpi-val" style="color:var(--g2)">${_peakPt?_peakPt.hdp.toFixed(0)+'%':'—'}</div><div class="kpi-lbl">Peak${_peakPt?' ('+_peakPt.label+')':''}</div></div>
          <div class="kpi"><div class="kpi-val">${_pdsAbove80}</div><div class="kpi-lbl">${_lbl}s ≥80%</div></div>
          <div class="kpi"><div class="kpi-val" style="color:${_tCol}">${_tArrow} ${_lastPt?_lastPt.hdp.toFixed(0)+'%':'—'}</div><div class="kpi-lbl">Latest ${_lbl}</div></div>
        </div>
        <div class="sec-hdr" style="margin-top:4px">Production Trend — ${isWeekly?'By Flock Age Week':'By Calendar Month'}</div>
        <div class="card" style="padding:16px">
          ${_trendSvg}
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--gray)">
            <span><svg width="20" height="8" viewBox="0 0 20 8" style="vertical-align:middle"><line x1="1" y1="4" x2="19" y2="4" stroke="#27ae60" stroke-width="2.5"/></svg> ≥80%</span>
            <span><svg width="20" height="8" viewBox="0 0 20 8" style="vertical-align:middle"><line x1="1" y1="4" x2="19" y2="4" stroke="#e67e22" stroke-width="2.5"/></svg> 70–80%</span>
            <span><svg width="20" height="8" viewBox="0 0 20 8" style="vertical-align:middle"><line x1="1" y1="4" x2="19" y2="4" stroke="#c0392b" stroke-width="2.5"/></svg> &lt;70%</span>
            ${_yMax>=80?`<span><svg width="20" height="8" viewBox="0 0 20 8" style="vertical-align:middle"><line x1="1" y1="4" x2="19" y2="4" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,2"/></svg> 80% target</span>`:''}
            ${_yMax>=70?`<span><svg width="20" height="8" viewBox="0 0 20 8" style="vertical-align:middle"><line x1="1" y1="4" x2="19" y2="4" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,2"/></svg> 70% floor</span>`:''}
          </div>
        </div>
        <div class="sec-hdr">${isWeekly?'Weekly':'Monthly'} Breakdown</div>
        <div class="card" style="padding:0;overflow:hidden">
          <table class="ana-table">
            <tr><th>${_lbl}</th><th>Eggs</th><th>Avg HDP</th><th>vs 80%</th></tr>
            ${[..._tPoints].reverse().map(p=>{const diff=p.hdp-80;const dc=diff>=0?'var(--g2)':diff>-10?'var(--amber)':'var(--red)';
              return`<tr><td><b>${p.label}</b>${p===_peakPt?'<span style="font-size:9px;color:var(--g2);margin-left:4px">▲Peak</span>':''}</td>
                <td style="font-weight:800">${p.eggs}</td><td>${rateBadge(p.hdp)}</td>
                <td style="font-weight:700;color:${dc}">${diff>0?'+':''}${diff.toFixed(1)}%</td></tr>`;}).join('')}
          </table>
        </div>`;
    }
    tabContent=`<div class="inner-tabs" style="background:var(--light)">
      <button class="inner-tab ${ANA_TAB==='cells'?'active':''}" onclick="ANA_TAB='cells';renderReports()">Cells</button>
      <button class="inner-tab ${ANA_TAB==='rounds'?'active':''}" onclick="ANA_TAB='rounds';renderReports()">Rounds</button>
      <button class="inner-tab ${ANA_TAB==='pens'?'active':''}" onclick="ANA_TAB='pens';renderReports()">Pens</button>
      <button class="inner-tab ${ANA_TAB==='trend'?'active':''}" onclick="ANA_TAB='trend';renderReports()">📈 Trend</button>
    </div>${tabContent}`;

  } else if(REP_TAB==='flock'){
    const bRecs=DB.getBirds().sort((a,b)=>a.date.localeCompare(b.date));
    const last30=bRecs.filter(r=>{const d=new Date(DB.today());d.setDate(d.getDate()-30);return r.date>=d.toISOString().slice(0,10);});
    const totalDeaths=last30.reduce((s,r)=>s+(r.deaths||0),0);
    const totalCulls=last30.reduce((s,r)=>s+(r.culls||0),0);
    const maxDeath=Math.max(...last30.map(r=>r.deaths||0),1);
    const chartBars=last30.slice(-14).map(r=>{
      const h=Math.max(2,Math.round((r.deaths||0)/maxDeath*50));
      const c=(r.deaths||0)===0?'var(--g4)':(r.deaths/r.opening_birds*100)>0.5?'var(--red)':'var(--amber)';
      return`<div class="bar-col"><div class="bar-fill" style="height:${h}px;background:${c}"></div>
        <div class="bar-lbl">${(r.deaths||0)}</div></div>`;}).join('');
    tabContent=`
      <div class="kpi-row-3">
        <div class="kpi"><div class="kpi-val" style="color:var(--red)">${totalDeaths}</div><div class="kpi-lbl">Deaths (30d)</div></div>
        <div class="kpi"><div class="kpi-val" style="color:var(--amber)">${totalCulls}</div><div class="kpi-lbl">Culls (30d)</div></div>
        <div class="kpi"><div class="kpi-val">${farmBirds}</div><div class="kpi-lbl">Current Birds</div></div>
      </div>
      <div class="sec-hdr" style="margin-top:8px">Daily Mortality (Last 14 Days)</div>
      <div class="card"><div class="bar-chart-row">${chartBars||'<div style="color:var(--gray);font-size:13px">No flock data.</div>'}</div></div>
      <div class="sec-hdr">Death Log (Last 30 Days)</div>
      <div class="card" style="padding:0;overflow:hidden">
        ${last30.filter(r=>(r.deaths||0)>0).reverse().map(r=>{
          const mortality=r.opening_birds>0?(r.deaths/r.opening_birds*100):0;
          const bc=mortality>0.5?'badge-red':mortality>0.2?'badge-amber':'badge-gray';
          return`<div class="list-item"><div>
            <div style="font-weight:700;font-size:14px">${fmtDate(r.date)}</div>
            <div style="font-size:12px;color:var(--gray)">${r.deaths} deaths · ${r.culls} culls · Opening: ${r.opening_birds}</div>
            </div><span class="badge ${bc}">${mortality.toFixed(2)}%</span></div>`;}).join('')||
          '<div class="empty" style="padding:24px"><p>No deaths recorded in last 30 days.</p></div>'}
      </div>`;

  } else if(REP_TAB==='feed'){
    const fRecs=DB.getFeed().sort((a,b)=>a.date.localeCompare(b.date));
    // KPI window — always most recent 30 days
    const _cutoff30=(()=>{const d=new Date(DB.today());d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);})();
    const last30f=fRecs.filter(r=>r.date>=_cutoff30);
    const totalFeed=last30f.reduce((s,r)=>s+(r.feed_kg_used||0),0);
    const totalReq=last30f.reduce((s,r)=>s+(r.feed_req_kg||0),0);
    const totalEggsForFCR=DB.getCols().filter(c=>validPenIds.has(c.penId)&&c.date>=_cutoff30).reduce((s,c)=>(c.entries||[]).reduce((ss,e)=>ss+(e.eggs||0),s),0);
    const eggKg=totalEggsForFCR*0.06;
    const fcr=eggKg>0?(totalFeed/eggKg):null;
    const gPerEgg=totalEggsForFCR>0?((totalFeed*1000)/totalEggsForFCR):null;
    // Chart window — navigable via FEED_CHART_OFFSET
    const _chartEnd=(()=>{const d=new Date(DB.today());d.setDate(d.getDate()-FEED_CHART_OFFSET*30);return d.toISOString().slice(0,10);})();
    const _chartStart=(()=>{const d=new Date(DB.today());d.setDate(d.getDate()-FEED_CHART_OFFSET*30-30);return d.toISOString().slice(0,10);})();
    const chartFeed=fRecs.filter(r=>r.date>_chartStart&&r.date<=_chartEnd);
    const hasPrev=fRecs.some(r=>r.date<=_chartStart);
    const dailyFeed=Object.entries(chartFeed.reduce((m,r)=>{(m[r.date]=m[r.date]||{kg:0,req:0});m[r.date].kg+=r.feed_kg_used||0;m[r.date].req+=r.feed_req_kg||0;return m;},{}))
      .sort((a,b)=>a[0].localeCompare(b[0]));
    const feedChartSvg=(()=>{
      const n=dailyFeed.length; if(n===0)return'<div style="color:var(--gray);font-size:13px;padding:20px 0">No feed data for this period.</div>';
      const svgW=600,cH=58,svgH=74,slot=svgW/n,bW=slot*0.52;
      const maxVal=Math.max(...dailyFeed.map(([,v])=>Math.max(v.kg,v.req||0)),1);
      const lblStep=Math.ceil(n/12);
      const bars=dailyFeed.map(([,v],i)=>{
        const x=i*slot+(slot-bW)/2,bH=Math.max(1,(v.kg/maxVal)*cH),y=cH-bH;
        const vr=v.req>0?(v.kg-v.req)/v.req*100:0;
        const col=Math.abs(vr)>15?'#c0392b':Math.abs(vr)>10?'#e67e22':'#27ae60';
        const lbl=i%lblStep===0||i===n-1?v.kg.toFixed(0):'';
        return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${col}" rx="1.5"/>${lbl?`<text x="${(x+bW/2).toFixed(1)}" y="${svgH-1}" text-anchor="middle" font-size="7" fill="#aaa">${lbl}</text>`:''}`;
      }).join('');
      const tPts=dailyFeed.map(([,v],i)=>{if(!v.req)return null;const x=i*slot+slot/2,y=cH-(v.req/maxVal)*cH;return`${x.toFixed(1)},${Math.max(0,y).toFixed(1)}`;}).filter(Boolean);
      const tLine=tPts.length>0?`<polyline points="${tPts.join(' ')}" fill="none" stroke="#4895ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${tPts.map(pt=>{const[x,y]=pt.split(',');return`<circle cx="${x}" cy="${y}" r="2.5" fill="#4895ef"/>`;}).join('')}`:'';
      return`<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto;display:block;overflow:visible">
        <line x1="0" y1="0.5" x2="${svgW}" y2="0.5" stroke="#f0f0f0" stroke-width="1"/>
        ${bars}${tLine}</svg>`;
    })();
    const navBtnStyle='border:none;background:none;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1';
    const navBtnDis='opacity:.25;cursor:default;pointer-events:none';
    tabContent=`
      <div class="kpi-row-3">
        <div class="kpi"><div class="kpi-val">${totalFeed.toFixed(0)}</div><div class="kpi-lbl">kg Used (30d)</div></div>
        <div class="kpi"><div class="kpi-val" style="color:${fcr&&fcr<8?'var(--g2)':fcr&&fcr<12?'var(--amber)':'var(--red)'}">${fcr?fcr.toFixed(1):'—'}</div><div class="kpi-lbl">FCR (30d)</div></div>
        <div class="kpi"><div class="kpi-val">${gPerEgg?gPerEgg.toFixed(0)+'g':'—'}</div><div class="kpi-lbl">Feed/Egg (30d)</div></div>
      </div>
      <details style="background:var(--blueBg);border:1.5px solid var(--blue);border-radius:var(--radius);padding:10px 14px;margin:0 16px 10px">
        <summary style="font-size:12px;color:#1a5fa8;font-weight:700;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center">FCR Benchmark <span style="font-size:10px;color:#5a9fd4;font-weight:400">tap to expand</span></summary>
        <div style="font-size:13px;color:var(--gray);margin-top:8px">FCR = kg feed ÷ kg eggs (30-day window). Target: <b>FCR &lt; 8</b> · g feed/egg: <b>110–130g</b>.</div>
      </details>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px">
        <span style="font-size:12px;font-weight:800;color:var(--g1);text-transform:uppercase;letter-spacing:.4px">Daily Feed Usage</span>
        <div style="display:flex;align-items:center;gap:4px">
          <button style="${navBtnStyle}${!hasPrev?navBtnDis:''}" onclick="FEED_CHART_OFFSET++;renderReports()" title="Earlier">←</button>
          <span style="font-size:11px;color:var(--gray);min-width:130px;text-align:center">${fmtDate(_chartStart)} – ${fmtDate(_chartEnd)}</span>
          <button style="${navBtnStyle}${FEED_CHART_OFFSET===0?navBtnDis:''}" onclick="FEED_CHART_OFFSET=Math.max(0,FEED_CHART_OFFSET-1);renderReports()" title="Later">→</button>
        </div>
      </div>
      <div class="card" style="padding:16px">
        ${feedChartSvg}
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--gray)">
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:10px;background:#27ae60;border-radius:2px"></span>On target (≤10%)</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:10px;background:#e67e22;border-radius:2px"></span>10–15% off</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:10px;background:#c0392b;border-radius:2px"></span>&gt;15% off</span>
          <span style="display:flex;align-items:center;gap:5px"><svg width="22" height="10" viewBox="0 0 22 10"><line x1="0" y1="5" x2="22" y2="5" stroke="#4895ef" stroke-width="2"/><circle cx="11" cy="5" r="2.5" fill="#4895ef"/></svg>Expected (from saved req)</span>
        </div>
      </div>
      <div class="sec-hdr">Feed Log · ${fmtDate(_chartStart)} – ${fmtDate(_chartEnd)}</div>
      <div class="card" style="padding:0;overflow:hidden">
        ${chartFeed.slice().reverse().slice(0,20).map(r=>{
          const vr=r.feed_req_kg>0?((r.feed_kg_used-r.feed_req_kg)/r.feed_req_kg*100):0;
          const bc=Math.abs(vr)>15?'badge-red':Math.abs(vr)>10?'badge-amber':'badge-green';
          return`<div class="list-item"><div>
            <div style="font-weight:700;font-size:14px">${fmtDate(r.date)} — ${r.feed_type}</div>
            <div style="font-size:12px;color:var(--gray)">${r.feed_kg_used}kg used · Req: ${r.feed_req_kg}kg</div></div>
            <span class="badge ${bc}">${vr>0?'+':''}${vr.toFixed(0)}%</span></div>`;}).join('')||
          '<div class="empty" style="padding:24px"><p>No feed records.</p></div>'}
      </div>`;

  } else if(REP_TAB==='journal'){
    // Aggregate all notes from every module, sorted newest-first
    const journalEntries=[];
    DB.getBirds().forEach(r=>{if(r.notes)journalEntries.push({date:r.date,src:'Flock',srcCls:'badge-purple',icon:'🐔',note:r.notes,meta:`${r.opening_birds}→${r.closing_birds} birds · ${r.deaths} deaths`});});
    DB.getHealth().forEach(r=>{if(r.notes)journalEntries.push({date:r.date,src:'Health',srcCls:'badge-green',icon:'💊',note:r.notes,meta:`${r.droppings_observation||'—'} droppings${r.vaccination_or_medication?' · '+r.vaccination_or_medication:''}`});});
    DB.getFeed().forEach(r=>{if(r.notes)journalEntries.push({date:r.date,src:'Feed',srcCls:'badge-blue',icon:'🌾',note:r.notes,meta:`${r.feed_kg_used}kg used · ${r.feed_type}`});});
    DB.getExpenses().forEach(r=>{if(r.notes)journalEntries.push({date:r.date,src:'Expense',srcCls:'badge-red',icon:'💸',note:r.notes,meta:`${r.category} · ${fmtMoney(r.amount_ngn)}`});});
    DB.getSales().forEach(r=>{if(r.notes)journalEntries.push({date:r.date,src:'Sale',srcCls:'badge-green',icon:'🥚',note:r.notes,meta:`${r.product} · ${fmtMoney(r.total_amount_ngn)}`});});
    DB.getCols().filter(c=>c.notes).forEach(c=>{journalEntries.push({date:c.date,src:'Eggs',srcCls:'badge-amber',icon:'📝',note:c.notes,meta:`${c.penName} · ${c.lineName} · Side ${c.side} · ${c.roundLabel}`});});
    journalEntries.sort((a,b)=>b.date.localeCompare(a.date)||b.src.localeCompare(a.src));
    tabContent=journalEntries.length===0
      ?`<div class="empty" style="padding:48px 24px"><svg viewBox="0 0 24 24" style="width:44px;height:44px;stroke:var(--gray);fill:none;stroke-width:1.5;margin-bottom:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><h3>No notes yet</h3><p>Add notes when logging flock, health, feed, or sales records — they'll all appear here in one place.</p></div>`
      :`<div style="margin:12px 16px 4px;font-size:12px;color:var(--gray)">${journalEntries.length} note${journalEntries.length!==1?'s':''} across all modules</div>
        <div class="card" style="padding:0;overflow:hidden">
          ${journalEntries.map((e,i)=>{
            const showDate=i===0||e.date!==journalEntries[i-1].date;
            const dateHdr=showDate?`<div style="padding:8px 16px 4px;font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;background:var(--light);border-bottom:1px solid #eee">${fmtDate(e.date)}</div>`:'';
            return`${dateHdr}<div style="padding:12px 16px;border-bottom:1px solid #f5f5f5">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <span style="font-size:15px">${e.icon}</span>
                <span class="badge ${e.srcCls}" style="font-size:10px">${e.src}</span>
                <span style="font-size:11px;color:var(--gray)">${e.meta}</span>
              </div>
              <div style="font-size:14px;color:#1a1a1a;font-style:italic;line-height:1.5">"${e.note}"</div>
            </div>`;}).join('')}
        </div>`;

  } else if(REP_TAB==='finance'){
    const expenses=DB.getExpenses(), sales=DB.getSales();
    const today=DB.today(), thisMonth=today.slice(0,7);
    const monthExp=expenses.filter(e=>e.date.startsWith(thisMonth)).reduce((s,e)=>s+(e.amount_ngn||0),0);
    const monthSales=sales.filter(s=>s.date.startsWith(thisMonth)).reduce((s,e)=>s+(e.total_amount_ngn||0),0);
    const allExp=expenses.reduce((s,e)=>s+(e.amount_ngn||0),0);
    const allSales=sales.reduce((s,e)=>s+(e.total_amount_ngn||0),0);
    const totalEggsAll=DB.getCols().filter(c=>validPenIds.has(c.penId)).reduce((s,c)=>(c.entries||[]).reduce((ss,e)=>ss+(e.eggs||0),s),0);
    const costPerEgg=totalEggsAll>0?(allExp/totalEggsAll):null;
    const costPerCrate=costPerEgg?costPerEgg*30:null;
    const catMap={};
    expenses.forEach(e=>{catMap[e.category]=(catMap[e.category]||0)+(e.amount_ngn||0);});
    const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxCat=topCats[0]?.[1]||1;
    tabContent=`

// Export Data
function exportData(){
  const farm=DB.getFarm(), cols=DB.getCols(), birds=DB.getBirds();
  const feed=DB.getFeed(), health=DB.getHealth(), expenses=DB.getExpenses();
  const sales=DB.getSales();
  const validPenIds=new Set((farm?.pens||[]).map(p=>p.id));
  // Build daily_egg_production summary
  const eggDayMap={};
  cols.filter(c=>validPenIds.has(c.penId)).forEach(c=>{
    if(!eggDayMap[c.date])eggDayMap[c.date]={date:c.date,age_weeks:null,eggs_collected:0,cracked_eggs:0,eggs_spoiled:0};
    (c.entries||[]).forEach(e=>{eggDayMap[c.date].eggs_collected+=(e.eggs||0);eggDayMap[c.date].cracked_eggs+=(e.broken||0);});
  });
  birds.forEach(b=>{if(eggDayMap[b.date])eggDayMap[b.date].age_weeks=b.age_weeks;});
  const bundle={
    exported_at:new Date().toISOString(),source:'LayerTrack',version:'1.0',
    farm,
    daily_egg_production:Object.values(eggDayMap).sort((a,b)=>a.date.localeCompare(b.date)),
    egg_collection_detail:cols,
    daily_bird_status:birds.map(b=>({date:b.date,opening_birds:b.opening_birds,age_weeks:b.age_weeks,
      deaths:b.deaths,culls:b.culls,closing_birds:b.closing_birds,notes:b.notes})),
    daily_feed_usage:feed.map(f=>({date:f.date,age_weeks:f.age_weeks,feed_type:f.feed_type,
      feed_kg_used:f.feed_kg_used,feed_req_kg:f.feed_req_kg})),
    health_log:health.map(h=>({date:h.date,water_consumed_liters:h.water_consumed_liters,
      droppings_observation:h.droppings_observation,vaccination_or_medication:h.vaccination_or_medication,
      admin_method:h.admin_method,notes:h.notes})),
    expenses:expenses.map(e=>({date:e.date,category:e.category,amount_usd:e.amount_usd,amount_ngn:e.amount_ngn,notes:e.notes})),
    sales:sales.map(s=>({date:s.date,product:s.product,quantity:s.quantity,unit_price:s.unit_price_ngn,
      total_amount:s.total_amount_ngn,payment_type:s.payment_type||'cash',paid:s.paid!==false,
      due_date:s.due_date||null,customer:s.customer,notes:s.notes})),
    receivables:sales.filter(s=>s.payment_type==='credit').map(s=>({
      sale_date:s.date,customer:s.customer,product:s.product,quantity:s.quantity,
      amount_ngn:s.total_amount_ngn,due_date:s.due_date||null,paid:s.paid||false}))
  };
  const blob=new Blob([JSON.stringify(bundle,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`LayerTrack_export_${DB.today()}.json`;a.click();
  URL.revokeObjectURL(url);toast('Export complete ✓');
}
function _mergeById(existing,incoming){
  const map=new Map((existing||[]).map(r=>[r.id,r]));
  (incoming||[]).forEach(r=>{if(r.id&&!map.has(r.id))map.set(r.id,r);});
  return Array.from(map.values());
}
function importData(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    let data;
    try{ data=JSON.parse(e.target.result); }
    catch(err){
      openModal(`<div class="modal-ttl">Import Failed <button class="modal-x" onclick="closeModal()">×</button></div>
        <div style="background:#fee2e2;border-left:3px solid var(--red);padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;color:#7f1d1d;margin-bottom:12px">
          The file could not be parsed as JSON.<br><b>Error:</b> ${err.message}
        </div>
        <button class="btn btn-secondary" onclick="closeModal()">OK</button>`);
      input.value=''; return;
    }
    const counts={};
    if(data.farm){ DB.saveFarm(data.farm); counts.farm='1 farm config'; }
    if(data.egg_collection_detail?.length){ const m=_mergeById(DB.getCols(),data.egg_collection_detail); DB.saveCols(m); counts.eggs=data.egg_collection_detail.length+' egg sessions merged'; }
    if(data.daily_bird_status?.length){ const m=_mergeById(DB._arr(KEYS.birds),data.daily_bird_status); DB._set(KEYS.birds,m); counts.birds=data.daily_bird_status.length+' bird records merged'; }
    if(data.daily_feed_usage?.length){ const m=_mergeById(DB._arr(KEYS.feed),data.daily_feed_usage); DB._set(KEYS.feed,m); counts.feed=data.daily_feed_usage.length+' feed records merged'; }
    if(data.health_log?.length){ const m=_mergeById(DB._arr(KEYS.health),data.health_log); DB._set(KEYS.health,m); counts.health=data.health_log.length+' health records merged'; }
    if(data.expenses?.length){ const m=_mergeById(DB._arr(KEYS.expenses),data.expenses); DB._set(KEYS.expenses,m); counts.expenses=data.expenses.length+' expenses merged'; }
    if(data.sales?.length){ const m=_mergeById(DB._arr(KEYS.sales),data.sales); DB._set(KEYS.sales,m); counts.sales=data.sales.length+' sales merged'; }
    // Re-render all tabs so data is visible everywhere
    renderHome(); renderFlock(); renderFeed(); renderHealth(); renderFinance(); renderReports(); renderSettings();
    const lines=Object.values(counts);
    if(lines.length===0){
      openModal(`<div class="modal-ttl">Nothing Imported <button class="modal-x" onclick="closeModal()">×</button></div>
        <div style="font-size:13px;color:var(--gray);margin-bottom:12px">The file was valid JSON but contained no recognisable data arrays. Check that the file came from the LayerTrack converter.</div>
        <button class="btn btn-secondary" onclick="closeModal()">OK</button>`);
    } else {
      openModal(`<div class="modal-ttl">Import Complete ✓ <button class="modal-x" onclick="closeModal()">×</button></div>
        <div style="background:#d1fae5;border-left:3px solid var(--g2);padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;color:#065f46;margin-bottom:12px">
          ${lines.map(l=>`✓ ${l}`).join('<br>')}
        </div>
        <div style="font-size:12px;color:var(--gray);margin-bottom:12px">Existing data was preserved. New records were added alongside it.</div>
        <button class="btn btn-primary" onclick="closeModal()">Done</button>`);
    }
    input.value='';
  };
  reader.readAsText(file);
}

function showTrendTip(evt, pt) {
  const cr=Math.floor(pt.eggs/30),lp=pt.eggs%30;
  const eggStr=cr>0
    ?cr+' crate'+(cr>1?'s':'')+(lp>0?` <span style="font-size:10px;color:#999">${lp} pcs</span>`:'')
    :lp+' pcs';
  const col=pt.hdp>=80?'#27ae60':pt.hdp>=70?'#e67e22':'#c0392b';
  document.getElementById('trendTip').innerHTML=
    `<div style="font-weight:700;font-size:12px;margin-bottom:5px;color:#333">${pt.label}</div>`+
    `<div style="font-size:11px;margin-bottom:2px">Avg HDP: <b style="color:${col}">${pt.hdp.toFixed(1)}%</b></div>`+
    `<div style="font-size:11px">Eggs: <b>${eggStr}</b></div>`;
  document.getElementById('trendTip').style.display='block';
  positionTrendTip(evt);
}
function positionTrendTip(evt) {
  const tip=document.getElementById('trendTip');
  if(tip.style.display==='none')return;
  const x=evt.clientX+16,y=evt.clientY-14;
  const tw=tip.offsetWidth||160,th=tip.offsetHeight||70;
  tip.style.left=Math.min(x,window.innerWidth-tw-8)+'px';
  tip.style.top=Math.max(y-th,8)+'px';
}
function hideTrendTip(){document.getElementById('trendTip').style.display='none';}
